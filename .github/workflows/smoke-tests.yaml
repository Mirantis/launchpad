name: Smoke Tests

on:
  pull_request:
    types: [labeled, opened, synchronize, reopened]
    paths:
      - "**.go"
      - "**.tf"
      - ".terraform.lock.hcl"
      - "go.mod"
      - "go.sum"
      - "examples/terraform/aws-simple/**"
      - ".github/workflows/smoke-tests.yaml"
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  smoke-modern:
    runs-on: arc-runner-set-mirantis-public
    if: |
      github.event_name == 'push' ||
      contains(github.event.pull_request.labels.*.name, 'smoke-test') ||
      contains(github.event.pull_request.labels.*.name, 'smoke-modern')
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false
      - name: Run modern smoke test
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: make smoke-modern

  smoke-legacy:
    runs-on: arc-runner-set-mirantis-public
    if: |
      github.event_name == 'push' ||
      contains(github.event.pull_request.labels.*.name, 'smoke-test') ||
      contains(github.event.pull_request.labels.*.name, 'smoke-legacy')
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false
      - name: Run legacy smoke test
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: make smoke-legacy

  # Bleeding-edge platforms (rhel10/rocky10). MCR package availability for
  # these platforms lags their AMI/repo-metadata availability -- this job is
  # intentionally merged ahead of full support so it goes green automatically,
  # with no further workflow changes, once repos.mirantis.com publishes
  # docker-ee for rhel/10 and rocky/10. Label-gated rather than always-on
  # while that support is pending.
  smoke-cutting-edge:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' ||
      contains(github.event.pull_request.labels.*.name, 'smoke-test') ||
      contains(github.event.pull_request.labels.*.name, 'smoke-cutting-edge')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
      - name: Run cutting-edge smoke test
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: make smoke-cutting-edge

  smoke-windows:
    runs-on: arc-runner-set-mirantis-public
    if: |
      github.event_name == 'push' ||
      contains(github.event.pull_request.labels.*.name, 'smoke-test') ||
      contains(github.event.pull_request.labels.*.name, 'smoke-windows')
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false
      - name: Run windows smoke test
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: make smoke-windows

  smoke-fips:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' ||
      contains(github.event.pull_request.labels.*.name, 'smoke-test') ||
      contains(github.event.pull_request.labels.*.name, 'smoke-fips')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
      - name: Run FIPS smoke test
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: make smoke-fips

  smoke-upgrade:
    runs-on: arc-runner-set-mirantis-public
    if: |
      github.event_name == 'push' ||
      contains(github.event.pull_request.labels.*.name, 'smoke-test') ||
      contains(github.event.pull_request.labels.*.name, 'smoke-upgrade')
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false
      - name: Run upgrade smoke test
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: make smoke-upgrade
