# Release on version tags. Security scan runs before integration tests, then build and publish.
# DigiCert build+sign is in build-and-sign.yml; wire it in here when ready.

name: Release

permissions:
  contents: read
  actions: write # upload-artifact in build job

on:
  push:
    tags:
      - "v*"

jobs:
  security-scan:
    name: Security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run security scan
        run: make security-scan

  integration-test:
    name: Integration Tests
    needs: security-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Integration tests
        run: make integration-test

  build:
    name: Build release binaries
    needs: integration-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Build binaries
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          platforms=(linux/amd64 linux/arm64 windows/amd64 windows/arm64 darwin/amd64 darwin/arm64)
          for platform in "${platforms[@]}"; do
            GOOS=${platform%/*}
            GOARCH=${platform#*/}
            output_name="dist/launchpad_${GOOS}_${GOARCH}"
            if [ "$GOOS" = "windows" ]; then
              output_name+=".exe"
            fi
            echo "Building $output_name"
            GOOS=$GOOS GOARCH=$GOARCH go build -o "$output_name" ./main.go
          done
      - uses: actions/upload-artifact@v4
        with:
          name: launchpad-release-binaries
          path: dist/

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: launchpad-release-binaries
          path: dist/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
