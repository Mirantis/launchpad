# Build and test on push to main (unsigned); DigiCert build+sign is in build-and-sign.yml.

name: Build and Test

permissions:
  contents: read
  actions: write # upload-artifact

on:
  push:
    branches: [main]

jobs:
  build:
    name: Build binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Build binaries
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          platforms=(linux/amd64 linux/arm64 windows/amd64 windows/arm64 darwin/amd64 darwin/arm64)
          for platform in "${platforms[@]}"; do
            GOOS=${platform%/*}
            GOARCH=${platform#*/}
            output_name="dist/launchpad_${GOOS}_${GOARCH}"
            if [ "$GOOS" = "windows" ]; then
              output_name+=".exe"
            fi
            echo "Building $output_name"
            GOOS=$GOOS GOARCH=$GOARCH go build -o "$output_name" ./main.go
          done
      - uses: actions/upload-artifact@v4
        with:
          name: launchpad-binaries
          path: dist/

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Unit tests
        run: make unit-test
        env:
          TEST_FLAGS: -short
      - name: Integration tests
        run: make integration-test
